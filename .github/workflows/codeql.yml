name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: macos-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["c-cpp"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install wget autoconf automake libtool gettext

      - name: Setup zopen framework
        run: |
          # Download and extract zopen meta package
          curl -o meta-main.20260508_024412.zos.pax.Z -L https://github.com/zopencommunity/metaport/releases/download/STABLE_metaport_4269/meta-main.20260508_024412.zos.pax.Z
          pax -rf meta-main.20260508_024412.zos.pax.Z
          cd meta-main
          . ./.env
          zopen build -g
          
          # Verify zopen framework setup
          echo "zopen framework setup completed successfully"

      - name: Apply patches (z/OS specific - skip on macOS)
        run: |
          echo "Skipping z/OS specific patches on macOS build"
          # The patches in stable-patches/ are z/OS specific and won't apply on macOS
          # CodeQL will analyze the unpatched GNU sed source code

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Build sed with zopen
        run: |
          # Navigate to meta-main and source environment
          cd meta-main
          . ./.env
          
          # Build using zopen framework (already done in setup, but ensuring it's complete)
          zopen build -g
          
          # Verify build artifacts
          echo "Build completed with zopen framework"

        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
