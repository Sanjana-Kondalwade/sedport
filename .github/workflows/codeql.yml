name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: macos-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["c-cpp"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install wget autoconf automake libtool gettext

      - name: Download and extract sed source
        run: |
          # Download sed source from GNU FTP
          SED_VERSION="4.10"
          curl -L -o sed-${SED_VERSION}.tar.gz https://ftp.gnu.org/gnu/sed/sed-${SED_VERSION}.tar.gz
          
          # Extract tarball
          tar -xzf sed-${SED_VERSION}.tar.gz
          
          # Move source files to root of workspace (including hidden files)
          shopt -s dotglob
          mv sed-${SED_VERSION}/* .
          shopt -u dotglob
          
          # Cleanup
          rm -rf sed-${SED_VERSION} sed-${SED_VERSION}.tar.gz
          
          # Verify source files exist
          ls -la
          echo "Source files extracted successfully"

      - name: Apply patches (z/OS specific - skip on macOS)
        run: |
          echo "Skipping z/OS specific patches on macOS build"
          # The patches in stable-patches/ are z/OS specific and won't apply on macOS
          # CodeQL will analyze the unpatched GNU sed source code

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Build sed
        run: |
          # Configure and build sed
          ./configure --disable-nls
          make -j$(sysctl -n hw.ncpu)

        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
