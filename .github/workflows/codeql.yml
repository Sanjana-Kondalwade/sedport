name: "CodeQL"

permissions:
  actions: read
  contents: read
  security-events: write

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  codeql-analysis:
    uses: Sanjana-Kondalwade/meta/.github/workflows/codeql.yml@main
    with:
      languages: "c-cpp"
      build_mode: "none"

