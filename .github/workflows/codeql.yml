name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["cpp"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Download and setup metaport
        run: |
          sudo apt-get update
          sudo apt-get install -y pax

          sudo apt-get install -y ncompress pax

          curl -L -o meta-main.20260508_024412.zos.pax.Z \
          https://github.com/zopencommunity/metaport/releases/download/STABLE_metaport_4269/meta-main.20260508_024412.zos.pax.Z

          uncompress meta-main.20260508_024412.zos.pax.Z

          pax -rf meta-main.20260508_024412.zos.pax

          cd meta-main

          source ./.env || true

          echo "Metaport environment initialized"

      - name: Apply patches
        run: |
          if [ -f patches/apply_patches.sh ]; then
            chmod +x patches/apply_patches.sh
            ./patches/apply_patches.sh
          else
            echo "No apply_patches.sh found, skipping"
          fi

      # - name: Autobuild
      #   uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3