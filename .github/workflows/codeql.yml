name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["cpp"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake texinfo

      - name: Download and build sed
        run: |
          curl -L -o sed-4.10.tar.gz https://ftp.gnu.org/gnu/sed/sed-4.10.tar.gz
          tar -xzf sed-4.10.tar.gz
          cd sed-4.10
          ./configure
          make

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
