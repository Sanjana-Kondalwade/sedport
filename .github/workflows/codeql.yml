name: "CodeQL"

on:
  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

  schedule:
    - cron: "0 0 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: macos-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["c-cpp"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Initialize CodeQL BEFORE build
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Install build dependencies
        run: |
          brew update
          brew install wget autoconf automake libtool gettext

      - name: Download zopen metaport
        run: |
          curl -L \
            -o meta-main.zos.pax.Z \
            https://github.com/zopencommunity/metaport/releases/download/STABLE_metaport_4269/meta-main.20260508_024412.zos.pax.Z

      - name: Extract zopen metaport
        run: |
          gunzip meta-main.zos.pax.Z || true

          if [ -f meta-main.zos.pax ]; then
            pax -rf meta-main.zos.pax
          else
            pax -rf meta-main.zos.pax.Z
          fi

      - name: Setup zopen environment and build
        run: |
          cd meta-main

          # Load zopen environment
          . ./.env

          # Build GNU sed with zopen patches/framework
          zopen build -g

      - name: Verify build artifacts
        run: |
          echo "Checking generated files..."

          find meta-main -type f | head -50

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
